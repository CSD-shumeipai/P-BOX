name: Build Windows P-BOX

on:
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 3. 列出仓库结构（可选，调试用）
      - name: List files
        run: dir /s

      # 4. 编译 P-BOX（假设 main.go 在根目录，如果在子目录，请改 cd 路径）
      - name: Build P-BOX
        run: go build -ldflags "-s -w" -o P-BOX.exe main.go

      # 5. 打包成 zip
      - name: Create ZIP
        run: powershell Compress-Archive -Path P-BOX.exe -DestinationPath P-BOX-windows.zip

      # 6. 上传产物
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-BOX-windows
          path: P-BOX-windows.zip
