name: Build Windows P-BOX

on:
  workflow_dispatch:  # 网页手动触发

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      # 1️⃣ 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 3️⃣ 切换到 backend 目录（后端 Go 项目）
      - name: Change to backend directory
        working-directory: backend
        run: echo "Working directory set to backend/"

      # 4️⃣ 编译 Windows exe
      - name: Build P-BOX.exe
        working-directory: backend
        run: go build -ldflags "-s -w" -o p-box.exe main.go

      # 5️⃣ 打包成 zip
      - name: Create ZIP
        working-directory: backend
        run: powershell Compress-Archive -Path p-box.exe -DestinationPath p-box-windows.zip

      # 6️⃣ 上传产物
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-BOX-windows
          path: backend/p-box-windows.zip
