name: Build Windows P-BOX with Node Frontend

on:
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      # 1️⃣ 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # 3️⃣ 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 4️⃣ 构建前端
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # 5️⃣ 生成 Node.js 前端启动脚本
      - name: Create Frontend Start Script
        run: |
          echo "@echo off" > frontend\start-frontend.cmd
          echo "npx serve -s dist -l 3000" >> frontend\start-frontend.cmd

      # 6️⃣ 编译后端 Windows exe
      - name: Build Backend
        working-directory: backend
        run: go build -ldflags "-s -w" -o p-box.exe main.go

      # 7️⃣ 打包所有产物成 zip
      - name: Package Windows Zip
        run: |
          powershell Compress-Archive -Path backend\p-box.exe,frontend\dist\*,frontend\start-frontend.cmd -DestinationPath p-box-windows.zip

      # 8️⃣ 上传产物
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-BOX-windows-node
          path: p-box-windows.zip
