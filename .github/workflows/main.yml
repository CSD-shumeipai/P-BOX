name: 构建 Windows 一体化 EXE（前后端合并）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 构建前端生产包
        working-directory: frontend
        run: npm run build

      - name: 复制前端构建产物到后端期望路径
        run: |
          mkdir -p backend/frontend
          cp -r frontend/dist/. backend/frontend/

      - name: 编译 Windows EXE
        working-directory: backend
        env:
          CGO_ENABLED: 0
        run: |
          go mod tidy
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o p-box.exe .

      - name: 打包发布文件
        run: |
          mkdir -p release/p-box
          cp backend/p-box.exe release/p-box/
          cp -r backend/frontend release/p-box/          # 包含 index.html 和 assets/
          # 如果 config.yaml、logs 等在 data/ 或其他地方，也 cp -r backend/data release/p-box/ 如果需要
          cd release
          zip -r ../p-box-windows-amd64.zip p-box/

      - name: 上传构建结果
        uses: actions/upload-artifact@v4
        with:
          name: p-box-windows
          path: p-box-windows-amd64.zip
