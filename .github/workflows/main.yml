name: Build Windows P-BOX

on:
  workflow_dispatch:

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 3. 查找 go.mod 文件位置
      - name: Find go.mod
        id: findmod
        run: |
          echo "Searching for go.mod..."
          set MOD_DIR=
          for /r %%i in (go.mod) do set MOD_DIR=%%~dpi
          if "%MOD_DIR%"=="" (
            echo "go.mod not found!"
            exit /b 1
          )
          echo "Found go.mod in %MOD_DIR%"
          echo "mod_dir=%MOD_DIR%" >> $GITHUB_OUTPUT

      # 4. 编译 P-BOX
      - name: Build P-BOX
        run: |
          cd ${{ steps.findmod.outputs.mod_dir }}
          go mod tidy
          go build -ldflags "-s -w" -o P-BOX.exe main.go

      # 5. 打包 exe 为 zip
      - name: Create ZIP
        run: |
          cd ${{ steps.findmod.outputs.mod_dir }}
          powershell Compress-Archive -Path P-BOX.exe -DestinationPath P-BOX-windows.zip

      # 6. 上传产物
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-BOX-windows
          path: ${{ steps.findmod.outputs.mod_dir }}\P-BOX-windows.zip
