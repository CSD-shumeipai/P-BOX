name: Build Windows P-BOX with Frontend

on:
  workflow_dispatch:  # 网页手动触发

jobs:
  build_windows:
    runs-on: windows-latest

    steps:
      # 1️⃣ 拉取仓库
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 安装 Node.js（构建前端）
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # 3️⃣ 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      # 4️⃣ 构建前端
      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # 5️⃣ 复制前端静态文件到后端可访问目录
      - name: Copy Frontend to Backend
        run: |
          mkdir backend\static
          xcopy /E /I /Y frontend\dist backend\static\

      # 6️⃣ 编译后端 Windows exe
      - name: Build Backend
        working-directory: backend
        run: go build -ldflags "-s -w" -o p-box.exe main.go

      # 7️⃣ 打包 exe 和静态资源成 zip
      - name: Create ZIP
        working-directory: backend
        run: powershell Compress-Archive -Path p-box.exe,static\* -DestinationPath p-box-windows.zip

      # 8️⃣ 上传产物
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: P-BOX-windows
          path: backend/p-box-windows.zip
