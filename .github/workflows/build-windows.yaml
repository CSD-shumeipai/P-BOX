name: Build & Release P-BOX

# 当 push tag 时触发，例如 v1.0.0
on:
  push:
    branches:
      - main

jobs:
  build_windows:
    name: Build Windows Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build Backend (Windows x64)
        run: |
          cd backend
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o p-box-windows-amd64.exe

      - name: Build Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Collect Artifacts
        run: |
          mkdir -p release-windows
          cp backend/p-box-windows-amd64.exe release-windows/
          cp -r frontend/dist release-windows/frontend

      - name: Zip Release
        run: |
          cd release-windows
          zip -r p-box-windows-${{ github.ref_name }}.zip .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Zip as Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release-windows/p-box-windows-${{ github.ref_name }}.zip
          asset_name: p-box-windows-${{ github.ref_name }}.zip
          asset_content_type: application/zip
